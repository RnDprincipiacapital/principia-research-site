<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Irish Development Intelligence | Principia Capital</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #edf1f5;
      --ink: #142033;
      --muted: #687386;
      --line: #d9e0e8;
      --line-strong: #c3ccd8;
      --navy: #071936;
      --green: #24745f;
      --amber: #a66f19;
      --red: #a33b3b;
      --blue: #2f5f99;
      --shadow: 0 18px 44px rgba(20, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button, select, input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      max-width: 100vw;
      overflow-x: hidden;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 16px;
      background: var(--navy);
      color: #edf4ff;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 100vw;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(211, 170, 81, 0.54);
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #d3aa51;
      font: 600 18px/1 Georgia, serif;
      flex: none;
    }

    .brand strong {
      display: block;
      font: 600 17px/1.15 Georgia, "Times New Roman", serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: #9eabc0;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      width: 100%;
      min-width: 0;
      border: 0;
      border-radius: 6px;
      padding: 11px 12px;
      background: transparent;
      color: #b9c5d8;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .nav button span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav button.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .nav small {
      color: #74839b;
      font-size: 11px;
    }

    .source-note {
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 16px;
      color: #aab7ca;
      font-size: 12px;
    }

    .main {
      min-width: 0;
      padding: 20px 24px 32px;
    }

    .topbar {
      min-height: 64px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font: 650 28px/1.12 Georgia, "Times New Roman", serif;
      letter-spacing: 0;
    }

    .subline {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .control, .chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      padding: 7px 10px;
      font-size: 12px;
      box-shadow: 0 1px 0 rgba(20, 32, 51, 0.02);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .overview-grid {
      grid-template-columns: minmax(420px, 1.4fr) minmax(320px, 0.9fr);
      align-items: stretch;
    }

    .three-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .two-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-head {
      padding: 15px 16px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      color: var(--navy);
      font-size: 15px;
      font-weight: 700;
    }

    .panel-desc {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 16px;
      overflow-x: auto;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px;
      min-width: 0;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .value {
      margin-top: 8px;
      color: var(--navy);
      font-size: 24px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fbfcfd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 750;
      background: #f9fafc;
    }

    tr:last-child td { border-bottom: 0; }

    .score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 28px;
      border-radius: 6px;
      color: #fff;
      background: var(--green);
      font-weight: 750;
    }

    .score.mid { background: var(--amber); }
    .score.low { background: var(--red); }

    .status {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfd;
      white-space: nowrap;
    }

    .status.positive { color: var(--green); border-color: rgba(36, 116, 95, 0.28); }
    .status.mixed { color: var(--amber); border-color: rgba(166, 111, 25, 0.3); }
    .status.negative { color: var(--red); border-color: rgba(163, 59, 59, 0.28); }

    .bar-list {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 138px minmax(0, 1fr) 44px;
      gap: 10px;
      align-items: center;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: var(--w);
      background: var(--blue);
      border-radius: inherit;
    }

    .chart {
      height: 260px;
      display: flex;
      align-items: end;
      gap: 12px;
      padding: 18px 10px 4px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(180deg, #fff, #f8fafc);
    }

    .chart-col {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 8px;
      align-items: end;
      grid-template-rows: 1fr auto;
    }

    .bars {
      height: 190px;
      display: flex;
      align-items: end;
      justify-content: center;
      gap: 4px;
    }

    .bars span {
      width: 11px;
      border-radius: 4px 4px 0 0;
      display: block;
    }

    .bars .price { background: var(--blue); height: var(--price); }
    .bars .rent { background: var(--green); height: var(--rent); }
    .bars .supply { background: var(--amber); height: var(--supply); }

    .chart-label {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .policy-list {
      display: grid;
      gap: 10px;
    }

    .policy-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfd;
    }

    .policy-item h3 {
      margin: 0;
      font-size: 14px;
      color: var(--navy);
    }

    .policy-item p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .source-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfd;
    }

    .source-card a {
      color: var(--navy);
      font-weight: 700;
      text-decoration: none;
    }

    .source-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none !important; }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        padding: 16px;
      }
      .nav { grid-template-columns: repeat(7, minmax(0, 1fr)); }
      .nav button { justify-content: center; text-align: center; }
      .nav small { display: none; }
      .source-note { display: none; }
      .topbar, .overview-grid, .three-grid, .two-grid { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .source-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .main { padding: 16px; }
      h1 { font-size: 22px; line-height: 1.16; }
      .topbar { gap: 14px; }
      .controls {
        display: grid;
        grid-template-columns: 1fr;
        justify-items: stretch;
      }
      .control, .chip {
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      th, td { padding: 9px 7px; font-size: 12px; }
      .bar-row { grid-template-columns: 1fr; gap: 5px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">P</div>
        <div>
          <strong>Principia Capital</strong>
          <span>Irish development intelligence</span>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="source-note">
        Free-source MVP. Seed records are structured for live CSO, planning, zoning, RZLT, PPR, RTB, OPW, and BER connectors.
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Irish Development Intelligence</h1>
          <div class="subline" id="freshness">Loading dashboard snapshot...</div>
        </div>
        <div class="controls">
          <select class="control" id="regionFilter" aria-label="Region filter">
            <option value="all">All regions</option>
          </select>
          <span class="chip" id="sourceConfidence"><span class="dot"></span> Source confidence: loading</span>
        </div>
      </header>

      <section class="metrics" id="metrics"></section>

      <section id="view-opportunities" class="view hidden"></section>
      <section id="view-planning" class="view hidden grid two-grid"></section>
      <section id="view-counties" class="view hidden grid two-grid"></section>
      <section id="view-ground" class="view hidden grid two-grid"></section>
      <section id="view-market" class="view hidden grid two-grid"></section>
      <section id="view-feasibility" class="view hidden grid two-grid"></section>
      <section id="view-data" class="view hidden grid two-grid"></section>
    </main>
  </div>

  <script>
    const tabs = [
      ["opportunities", "Opportunities", "ranked pipeline"],
      ["planning", "Planning", "policy + risk"],
      ["counties", "Counties", "county data"],
      ["ground", "Ground", "satellite + soils"],
      ["market", "Market", "demand + supply"],
      ["feasibility", "Feasibility", "returns + cases"],
      ["data", "Data", "sources + calcs"],
    ];

    let snapshot;
    let activeTab = "opportunities";
    let selectedRegion = "all";
    let selectedSiteId = null;
    let selectedCounty = null;

    function fmtNumber(value) {
      return Number(value).toLocaleString("en-IE");
    }

    function fmtMoney(value) {
      return `€${Number(value).toFixed(1)}m`;
    }

    function pprSummary(site) {
      if (site.ppr_address_match_count && site.ppr_address_match_median_price) {
        return `PPR ${site.ppr_address_match_confidence} address €${fmtNumber(site.ppr_address_match_median_price)} · ${site.ppr_address_match_count} comps`;
      }
      if (site.ppr_median_price) {
        return `PPR county €${fmtNumber(site.ppr_median_price)} · ${fmtNumber(site.ppr_county_sale_count || 0)} sales`;
      }
      return "PPR --";
    }

    function scoreClass(score) {
      if (score >= 78) return "";
      if (score >= 70) return "mid";
      return "low";
    }

    function riskClass(value) {
      if (String(value).toLowerCase().includes("low")) return "positive";
      if (String(value).toLowerCase().includes("high")) return "negative";
      return "mixed";
    }

    function filteredSites() {
      return snapshot.sites.filter((site) => selectedRegion === "all" || site.region === selectedRegion);
    }

    function selectedSite() {
      const sites = filteredSites();
      return sites.find((site) => site.id === selectedSiteId) || sites[0] || snapshot.sites[0];
    }

    function selectedCountySummary() {
      const summaries = snapshot.county_summaries || [];
      return summaries.find((county) => county.county === selectedCounty) || summaries[0];
    }

    function renderNav() {
      document.getElementById("nav").innerHTML = tabs.map(([id, label, hint]) => `
        <button class="${id === activeTab ? "active" : ""}" data-tab="${id}">
          <span>${label}</span>
          <small>${hint}</small>
        </button>
      `).join("");
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          activeTab = button.dataset.tab;
          render();
        });
      });
    }

    function renderMetrics() {
      const p = snapshot.portfolio;
      document.getElementById("metrics").innerHTML = [
        ["Live candidates", p.live_sourced_sites ?? p.sites],
        ["Target units", fmtNumber(p.target_units)],
        ["Avg score", p.average_developer_score],
        ["Priority sites", p.high_priority_sites],
        ["Fallback records", p.fallback_sites ?? 0],
      ].map(([label, value]) => `
        <div class="metric">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join("");
    }

    function renderOpportunityTable(compact = false) {
      const sites = filteredSites();
      return `
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Live Sourcing Pipeline</h2>
              <p class="panel-desc">Multi-unit residential planning signals pulled from public live sources, then ranked for diligence.</p>
            </div>
            <span class="status">${snapshot.sourcing_pipeline?.planning_applications || "unknown"}</span>
          </div>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>Candidate</th>
                  <th>Region</th>
                  <th>Units</th>
                  <th>Supply</th>
                  <th>Rent</th>
                  <th>Zoning</th>
                  <th>Status</th>
                  <th>Prediction</th>
                  <th>Score</th>
                  ${compact ? "" : "<th>Next action</th>"}
                </tr>
              </thead>
              <tbody>
                ${sites.map((site) => `
                  <tr>
                    <td>
                      <a href="${site.source_url || "#"}" target="_blank" rel="noreferrer"><strong>${site.name}</strong></a>
                      <br><span class="subline">${site.development_address || site.zoning}</span>
                      ${site.received_date ? `<br><span class="subline">Received ${site.received_date} · ${site.application_number || ""}</span>` : ""}
                    </td>
                    <td>${site.region}</td>
                    <td>${site.target_units}</td>
                    <td><span class="status ${riskClass(site.supply_pressure || "unknown")}">${site.supply_pressure || "unknown"}</span><br><span class="subline">${site.local_authority_completions ?? "--"} completions ${site.latest_completion_quarter || ""}</span></td>
                    <td><span class="status ${riskClass(site.rent_pressure || "unknown")}">${site.rent_pressure || "unknown"}</span><br><span class="subline">${site.average_monthly_rent ? `€${fmtNumber(Math.round(site.average_monthly_rent))}/mo` : "--"} ${site.rtb_rent_year || ""}</span></td>
                    <td><a href="${site.zoning_source_url || site.myplan_gzt_url || "#"}" target="_blank" rel="noreferrer"><span class="status">${site.zoning_code || "--"}</span></a><br><span class="subline">${site.generalised_zoning || site.zoning_join_status || ""}</span></td>
                    <td><span class="status ${riskClass(site.application_status || site.flood)}">${site.application_status || site.flood}</span><br><span class="subline">${site.decision || ""}</span></td>
                    <td><span class="status ${riskClass(site.planning_delay_risk || "medium")}">${site.approval_probability_pct ?? "--"}% approval</span><br><span class="subline">${site.planning_delay_risk || "--"} delay · ${site.vendor_motivation || "--"} motivation</span></td>
                    <td><span class="score ${scoreClass(site.developer_score)}">${site.developer_score}</span><br><span class="subline">constraint ${site.constraint_score ?? "--"}</span><br><span class="subline">${pprSummary(site)}</span></td>
                    ${compact ? "" : `<td>${site.recommended_action}</td>`}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderPlanningRiskPanel(site = selectedSite()) {
      const rows = [
        ["Planning deliverability", 100 - site.planning_risk],
        ["Infrastructure readiness", site.infrastructure_readiness],
        ["Market demand", site.market_demand],
        ["Policy tailwind", site.policy_score],
      ];
      return `
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Planning Risk</h2>
              <p class="panel-desc">${site.name}</p>
            </div>
            <span class="status ${riskClass(site.flood)}">${site.flood} flood</span>
          </div>
          <div class="panel-body">
            <div class="bar-list">
              ${rows.map(([label, value]) => `
                <div class="bar-row">
                  <div>${label}</div>
                  <div class="bar-track"><div class="bar-fill" style="--w:${value}%"></div></div>
                  <strong>${value}</strong>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderOpportunities() {
      const summary = snapshot.watchlist?.summary || {};
      const alerts = snapshot.alerts || [];
      document.getElementById("view-opportunities").innerHTML = `
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Action Alerts</h2>
              <p class="panel-desc">${summary.note || "Rules-based alerts from live sourcing, feasibility, market, and policy signals."}</p>
            </div>
            <span class="status">${summary.model || "alerts"}</span>
          </div>
          <div class="panel-body">
            <div class="bar-list" style="margin-bottom:16px">
              ${[
                ["Active alerts", summary.alert_count || 0],
                ["High priority", summary.high_priority_count || 0],
                ["Pursue", summary.pursue_count || 0],
                ["Risk", summary.risk_count || 0],
              ].map(([label, value]) => `
                <div class="bar-row">
                  <div>${label}</div>
                  <div class="bar-track"><div class="bar-fill" style="--w:${Math.min(Number(value) * 8, 100)}%"></div></div>
                  <strong>${value}</strong>
                </div>
              `).join("")}
            </div>
            <table>
              <thead><tr><th>Alert</th><th>Type</th><th>Priority</th><th>Why</th><th>Action</th></tr></thead>
              <tbody>
                ${alerts.slice(0, 8).map((item) => `
                  <tr>
                    <td>${item.source_url ? `<a href="${item.source_url}" target="_blank" rel="noreferrer"><strong>${item.site_name}</strong></a>` : `<strong>${item.site_name}</strong>`}<br><span class="subline">${item.county}${item.units ? ` · ${item.units} units` : ""}</span></td>
                    <td><span class="status">${item.alert_type}</span></td>
                    <td><span class="status ${item.priority === "high" ? "negative" : item.priority === "medium" ? "mixed" : ""}">${item.priority}</span><br><span class="subline">${item.priority_score}</span></td>
                    <td>${(item.reasons || []).join(" ")}</td>
                    <td>${item.recommended_action}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        ${renderOpportunityTable(false)}
      `;
    }

    function renderPlanning() {
      document.getElementById("view-planning").innerHTML = `
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Policy Watch</h2>
              <p class="panel-desc">Policy items that change site timing, density, tenure, or bid discipline.</p>
            </div>
          </div>
          <div class="panel-body policy-list">
            ${snapshot.policy_items.map((item) => `
              <article class="policy-item">
                <div style="display:flex;justify-content:space-between;gap:10px">
                  <h3>${item.title}</h3>
                  <span class="status ${item.impact}">${item.impact}</span>
                </div>
                <p>${item.body}</p>
                <p><strong>Watch:</strong> ${item.watch}</p>
              </article>
            `).join("")}

                <tr>
                  <td><strong>CSO planning permissions</strong></td>
                  <td><span class="status">${snapshot.live_status?.cso_planning_permissions || "unknown"}</span></td>
                  <td>${fmtNumber(snapshot.live_market_context?.cso_planning_permissions?.state_total || 0)}</td>
                  <td>${snapshot.live_market_context?.cso_planning_permissions?.latest_quarter || ""} national permissions granted from BHQ13.</td>
                </tr>
                <tr>
                  <td><strong>CSO RPPI</strong></td>
                  <td><span class="status">${snapshot.live_status?.cso_rppi || "unknown"}</span></td>
                  <td>${fmtNumber(snapshot.live_market_context?.cso_rppi?.index || 0)}</td>
                  <td>${snapshot.live_market_context?.cso_rppi?.latest_quarter || ""} residential property price index; YoY ${snapshot.live_market_context?.cso_rppi?.yoy_pct ?? "--"}%.</td>
                </tr>
                <tr>
                  <td><strong>CSO CPI</strong></td>
                  <td><span class="status">${snapshot.live_status?.cso_cpi || "unknown"}</span></td>
                  <td>${fmtNumber((snapshot.live_market_context?.cso_cpi?.metrics || {})["All Items"]?.index || 0)}</td>
                  <td>${snapshot.live_market_context?.cso_cpi?.latest_month || ""} all-items and housing CPI from CPM20.</td>
                </tr>
                <tr>
                  <td><strong>CSO building materials WPI</strong></td>
                  <td><span class="status">${snapshot.live_status?.cso_building_materials_wpi || "unknown"}</span></td>
                  <td>${fmtNumber((snapshot.live_market_context?.cso_building_materials_wpi?.metrics || {}).Materials?.index || 0)}</td>
                  <td>${snapshot.live_market_context?.cso_building_materials_wpi?.latest_year || ""} construction-materials wholesale price index from WPA20.</td>
                </tr>
                <tr>
                  <td><strong>ECB policy rates</strong></td>
                  <td><span class="status">${snapshot.live_status?.ecb_policy_rates || "unknown"}</span></td>
                  <td>${fmtNumber((snapshot.live_market_context?.ecb_policy_rates?.rates || {}).deposit_facility_rate?.rate_pct || 0)}%</td>
                  <td>Deposit, main refinancing, and marginal lending rates from the ECB Data Portal API.</td>
                </tr>
                <tr>
                  <td><strong>Report intelligence</strong></td>
                  <td><span class="status">${snapshot.live_status?.report_intelligence || "unknown"}</span></td>
                  <td>${snapshot.live_market_context?.report_intelligence?.source_count || 0}</td>
                  <td>BPFI, Daft, and MyHome public report discovery with QA flags before extracted metrics enter underwriting.</td>
                </tr>
                <tr>
                  <td><strong>Dataset resources</strong></td>
                  <td><span class="status">${snapshot.live_status?.dataset_resource_health || "unknown"}</span></td>
                  <td>${(snapshot.live_market_context?.dataset_resource_health || []).length}</td>
                  <td>Package-level resource health for planning, RZLT, RTB rent, CSO completions, and PPR.</td>
                </tr>
                <tr>
                  <td><strong>Constraint sources</strong></td>
                  <td><span class="status">${snapshot.live_status?.constraint_source_health || "unknown"}</span></td>
                  <td>${(snapshot.live_market_context?.constraint_source_health || []).length}</td>
                  <td>Discovered zoning, flood, geology, and soil datasets for the next spatial-join layer.</td>
                </tr>
                <tr>
                  <td><strong>MyPlan zoning point query</strong></td>
                  <td><span class="status">${snapshot.live_status?.myplan_zoning || "unknown"}</span></td>
                  <td>${snapshot.geographic_context?.myplan_zoning_matches || 0}</td>
                  <td>${snapshot.geographic_context?.myplan_zoning_candidates || 0} candidate coordinates checked against the GZT Current Plan FeatureServer.</td>
                </tr>
                <tr>
                  <td><strong>GSI soils point query</strong></td>
                  <td><span class="status">${snapshot.live_status?.gsi_soils || "unknown"}</span></td>
                  <td>${snapshot.geographic_context?.gsi_soil_matches || 0}</td>
                  <td>${snapshot.portfolio?.sites || 0} candidate coordinates checked against the GSI/Teagasc/EPA soils FeatureServer.</td>
                </tr>
                <tr>
                  <td><strong>GSI bedrock point query</strong></td>
                  <td><span class="status">${snapshot.live_status?.gsi_bedrock || "unknown"}</span></td>
                  <td>${snapshot.geographic_context?.gsi_bedrock_matches || 0}</td>
                  <td>${snapshot.portfolio?.sites || 0} candidate coordinates checked against the GSI bedrock geology FeatureServer.</td>
                </tr>
                <tr>
                  <td><strong>GSI flood point query</strong></td>
                  <td><span class="status">${snapshot.live_status?.gsi_flood || "unknown"}</span></td>
                  <td>${snapshot.geographic_context?.gsi_flood_checked || 0}</td>
                  <td>${snapshot.geographic_context?.gsi_flood_matches || 0} candidate coordinates intersect queried GSI flood polygons.</td>
                </tr>
                <tr>
                  <td><strong>OPW flood handoff</strong></td>
                  <td><span class="status">${snapshot.live_status?.flood || "unknown"}</span></td>
                  <td>${snapshot.portfolio?.sites || 0}</td>
                  <td>OPW viewer links remain available for manual site review; point screening uses queryable GSI flood layers.</td>
                </tr>
                <tr>
                  <td><strong>Ground status</strong></td>
                  <td><span class="status">${snapshot.live_status?.flood_and_ground || "unknown"}</span></td>
                  <td>${snapshot.portfolio?.sites || 0}</td>
                  <td>GSI soil, bedrock, and flood point-query scoring is live; OPW remains a viewer handoff.</td>
                </tr>
              </tbody>
            </table>
            <p class="subline">${(snapshot.sourcing_pipeline?.errors || []).length ? `Pipeline warnings: ${snapshot.sourcing_pipeline.errors.join(", ")}` : "Pipeline completed without recorded source errors."}</p>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Refresh Automation</h2>
              <p class="panel-desc">Scheduled path for regenerating the public-source snapshot and publishing the live site.</p>
            </div>
            <span class="status">${automation.status?.replaceAll("_", " ") || "unknown"}</span>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Item</th><th>Value</th></tr></thead>
              <tbody>
                <tr><td><strong>Cadence</strong></td><td>${automation.cadence || "--"} · ${automation.schedule_cron_utc || "--"} UTC</td></tr>
                <tr><td><strong>Workflow</strong></td><td>${automation.workflow_path || "--"}</td></tr>
                <tr><td><strong>Deploy target</strong></td><td>${automation.deploy_target || "--"} · ${automation.firebase_project || "--"}</td></tr>
                <tr><td><strong>Live URL</strong></td><td><a href="${automation.live_url || "#"}" target="_blank" rel="noreferrer">${automation.live_url || "--"}</a></td></tr>
                <tr><td><strong>Verification</strong></td><td><a href="${automation.verification_url || "#"}" target="_blank" rel="noreferrer">${automation.verification_url || "--"}</a></td></tr>
                <tr><td><strong>Required secrets</strong></td><td>${(automation.required_secrets || []).join(", ") || "--"}</td></tr>
              </tbody>
            </table>
            <p class="subline">${(automation.notes || []).join(" ")}</p>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Watchlist Engine</h2>
              <p class="panel-desc">Rules-based action list generated from live planning, market, feasibility, and policy signals.</p>
            </div>
            <span class="status">${snapshot.watchlist?.summary?.model || "unknown"}</span>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Candidate</th><th>Priority</th><th>Trigger</th><th>Margin</th><th>Action</th></tr></thead>
              <tbody>
                ${(snapshot.watchlist?.items || []).slice(0, 12).map((item) => `
                  <tr>
                    <td>${item.source_url ? `<a href="${item.source_url}" target="_blank" rel="noreferrer"><strong>${item.site_name}</strong></a>` : `<strong>${item.site_name}</strong>`}<br><span class="subline">${item.county}${item.units ? ` · ${item.units} units` : ""}</span></td>
                    <td><span class="status ${item.priority === "high" ? "negative" : item.priority === "medium" ? "mixed" : ""}">${item.priority}</span><br><span class="subline">${item.priority_score}</span></td>
                    <td>${(item.reasons || []).join(" ")}</td>
                    <td>${item.base_margin_pct ?? "--"}%<br><span class="subline">${item.base_irr_pct ?? "--"}% IRR</span></td>
                    <td>${item.recommended_action}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">SaaS Data Tiers</h2>
              <p class="panel-desc">Infrastructure split for the Irish developer product before live connectors are added.</p>
            </div>
          </div>
          <div class="panel-body source-grid">
            ${(snapshot.saas_tiers || []).map((tier) => `
              <article class="source-card">
                <strong>${tier.name}</strong>
                <p>${tier.goal}</p>
                <p><span class="status">${tier.id.replaceAll("_", " ")}</span></p>
              </article>
            `).join("")}
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Live Resource Inventory</h2>
              <p class="panel-desc">Machine-readable resources discovered for the current MVP connector set.</p>
            </div>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Dataset</th><th>Modified</th><th>Resources</th><th>Machine-readable</th></tr></thead>
              <tbody>
                ${(snapshot.live_market_context?.dataset_resource_health || []).map((item) => `
                  <tr>
                    <td><a href="${item.dataset_url}" target="_blank" rel="noreferrer"><strong>${item.title || item.package}</strong></a></td>
                    <td>${item.metadata_modified || ""}</td>
                    <td>${item.resource_count}</td>
                    <td>${item.machine_resource_count}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Source Registry</h2>
              <p class="panel-desc">Public and free datasets now captured as a connector-ready backlog.</p>
            </div>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Source</th><th>Tier</th><th>Access</th><th>Cost</th><th>Priority</th><th>Next step</th></tr></thead>
              <tbody>
                ${(snapshot.source_registry || []).map((source) => `
                  <tr>
                    <td><a href="${source.urls?.[0] || "#"}" target="_blank" rel="noreferrer"><strong>${source.name}</strong></a><br><span class="subline">${source.category.replaceAll("_", " ")}</span></td>
                    <td>${tiersById[source.tier]?.name || source.tier}</td>
                    <td>${source.connector_type.replaceAll("_", " ")}<br><span class="subline">${source.access_method}</span></td>
                    <td>${source.cost}</td>
                    <td><span class="status">${source.priority}</span></td>
                    <td>${source.next_step}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Connector Backlog</h2>
              <p class="panel-desc">Build order for turning the source registry into live dashboard feeds.</p>
            </div>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Phase</th><th>Name</th><th>Sources</th><th>Deliverable</th><th>Status</th></tr></thead>
              <tbody>
                ${(snapshot.connector_backlog || []).map((phase) => `
                  <tr>
                    <td><strong>${phase.phase.replaceAll("_", " ")}</strong></td>
                    <td>${phase.name}</td>
                    <td>${phase.source_ids.join(", ").replaceAll("_", " ")}</td>
                    <td>${phase.deliverable}</td>
                    <td><span class="status">${phase.status.replaceAll("_", " ")}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Data Shown</h2>
              <p class="panel-desc">Free or public-source datasets represented in the dashboard snapshot.</p>
            </div>
          </div>
          <div class="panel-body">
            <table>
              <thead><tr><th>Dataset</th><th>Category</th><th>Coverage</th><th>Refresh</th><th>Status</th></tr></thead>
              <tbody>
                ${(snapshot.sources || []).map((source) => `
                  <tr>
                    <td><a href="${source.url}" target="_blank" rel="noreferrer"><strong>${source.name}</strong></a></td>
                    <td>${source.category}</td>
                    <td>${source.coverage}</td>
                    <td>${source.refresh}</td>
                    <td><span class="status">${source.status.replaceAll("_", " ")}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">Calculations Done</h2>
              <p class="panel-desc">Transparent formulas and weighting logic used by the static snapshot.</p>
            </div>
          </div>
          <div class="panel-body">
            <div class="bar-list" style="margin-bottom:16px">
              ${weights.map(([label, value]) => `
                <div class="bar-row">
                  <div>${label.replaceAll("_", " ")}</div>
                  <div class="bar-track"><div class="bar-fill" style="--w:${value}%"></div></div>
                  <strong>${value}%</strong>
                </div>
              `).join("")}
            </div>
            <table>
              <thead><tr><th>Metric</th><th>Calculation</th><th>Developer use</th></tr></thead>
              <tbody>
                ${(snapshot.methodology?.calculation_notes || []).map((item) => `
                  <tr>
                    <td><strong>${item.metric}</strong></td>
                    <td>${item.calculation}</td>
                    <td>${item.use}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
            <p class="subline">${snapshot.methodology?.note || ""}</p>
          </div>
        </div>
      `;
    }

    function renderRegionOptions() {
      const select = document.getElementById("regionFilter");
      const current = select.value || selectedRegion;
      select.innerHTML = `<option value="all">All regions</option>` + snapshot.regions.map((region) => `
        <option value="${region.name}">${region.name}</option>
      `).join("");
      select.value = current;
      select.addEventListener("change", () => {
        selectedRegion = select.value;
        selectedSiteId = null;
        render();
      });
    }

    function render() {
      renderNav();
      renderMetrics();
      document.getElementById("sourceConfidence").innerHTML = `<span class="dot"></span> Source confidence: ${snapshot.sourcing_pipeline?.mode || "unknown"}`;
      document.querySelectorAll(".view").forEach((view) => view.classList.add("hidden"));
      document.getElementById(`view-${activeTab}`).classList.remove("hidden");
      if (activeTab === "opportunities") renderOpportunities();
      if (activeTab === "planning") renderPlanning();
      if (activeTab === "counties") renderCounties();
      if (activeTab === "ground") renderGround();
      if (activeTab === "market") renderMarket();
      if (activeTab === "feasibility") renderFeasibility();
      if (activeTab === "data") renderData();
    }

    async function loadSnapshot() {
      const paths = [
        "/data/real-estate-dashboard.json",
        new URL("data/real-estate-dashboard.json", window.location.href).href,
      ];
      let lastError;
      for (const path of paths) {
        try {
          const response = await fetch(path, { cache: "no-store" });
          if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
          return await response.json();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("Snapshot request failed");
    }

    async function boot() {
      snapshot = await loadSnapshot();
      selectedSiteId = snapshot.sites[0]?.id;
      document.getElementById("freshness").textContent = `Snapshot generated ${new Date(snapshot.generated_at).toLocaleString("en-IE", { dateStyle: "medium", timeStyle: "short" })}`;
      renderRegionOptions();
      render();
    }

    boot().catch((error) => {
      document.getElementById("freshness").innerHTML = `Dashboard failed to load snapshot. <a href="/data/real-estate-dashboard.json">Open data file</a>. ${error.message}`;
    });
  </script>
</body>
</html>
